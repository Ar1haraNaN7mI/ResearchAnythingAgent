<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Agent</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #0f1419; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 12px 16px; background: #161b22; border-bottom: 1px solid #30363d; }
    h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    #log { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    .row { display: flex; gap: 8px; padding: 12px 16px; background: #161b22; border-top: 1px solid #30363d; }
    #msg { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: 14px; }
    #send { padding: 10px 18px; border-radius: 8px; border: none; background: #238636; color: #fff; font-weight: 600; cursor: pointer; }
    #send:hover { background: #2ea043; }
    .hint { font-size: 12px; color: #8b949e; margin-top: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>Research Agent — autoresearch + CIL Anything</h1>
    <p class="hint">New messages always preempt background research. Commands: train, prepare, cil …, auto on/off, stop, help</p>
  </header>
  <div id="log"></div>
  <div class="row">
    <input id="msg" type="text" placeholder="Type a command…" autocomplete="off" />
    <button id="send" type="button">Send</button>
  </div>
  <script>
    const log = document.getElementById("log");
    const msg = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(proto + "://" + location.host + "/ws");
    function line(t) {
      log.textContent += t + "\n";
      log.scrollTop = log.scrollHeight;
    }
    ws.onmessage = (ev) => line(ev.data);
    ws.onclose = () => line("[agent] disconnected");
    ws.onerror = () => line("[agent] connection error");
    function send() {
      const t = msg.value.trim();
      if (!t) return;
      msg.value = "";
      ws.send(t);
    }
    sendBtn.onclick = send;
    msg.onkeydown = (e) => { if (e.key === "Enter") send(); };
  </script>
</body>
</html>
